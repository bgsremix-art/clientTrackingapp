name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub

jobs:
  build-ios:
    runs-on: macos-15 # Stable macOS image for iOS builds

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: |
          npm ci
        env:
          CI: true

      - name: Select Latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Generate iOS Folder (Expo Prebuild)
        run: |
          npx expo prebuild --platform ios --no-install --clean
        env:
          CI: true

      - name: Configure Podfile
        run: |
          ruby <<'RUBY'
          path = "ios/Podfile"
          content = File.read(path)

          if content.match?(/^platform :ios,/)
            content.sub!(/^platform :ios,.*$/, "platform :ios, '15.1'")
          else
            content = "platform :ios, '15.1'\n" + content
          end

          target_fix = <<~TARGET_FIX.rstrip
                installer.pods_project.targets.each do |target|
                  target.build_configurations.each do |config|
                    config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "15.1"
                  end
                end
          TARGET_FIX

          unless content.include?('IPHONEOS_DEPLOYMENT_TARGET')
            if content.include?('post_install do |installer|')
              content.sub!(/post_install do \|installer\|/, "post_install do |installer|\n#{target_fix}")
            else
              content += "\npost_install do |installer|\n#{target_fix}\nend\n"
            end
          end

          File.write(path, content)
          RUBY
          cat ios/Podfile

      - name: Verify iOS Folder Generation
        run: |
          if [ ! -d "ios" ]; then
            echo "::error::The 'ios' folder was not generated. Expo prebuild failed."
            exit 1
          fi

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update

      - name: List Xcode Schemes (Debug)
        run: |
          cd ios
          # Find the workspace file
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          echo "Found workspace: $WORKSPACE"
          xcodebuild -list -workspace "$WORKSPACE"

      - name: Build iOS App (Unsigned)
        shell: bash
        run: |
          set -eo pipefail
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          echo "Using workspace: $WORKSPACE"
          
          # Use 'build' instead of 'archive' for better compatibility with unsigned builds
          # Limit jobs to reduce native target scheduling issues in GitHub Actions.
          xcodebuild -workspace "$WORKSPACE" -scheme clientTracking -configuration Release -destination 'generic/platform=iOS' -sdk iphoneos build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" COMPILER_INDEX_STORE_ENABLE=NO ONLY_ACTIVE_ARCH=NO -jobs 1 -derivedDataPath ./build 2>&1 | tee build.log
          XCODE_STATUS=${PIPESTATUS[0]}
          if [ "$XCODE_STATUS" -ne 0 ]; then
            echo "Last 100 lines of xcodebuild log:"
            tail -n 100 build.log || true
            exit "$XCODE_STATUS"
          fi
          
          # Package the compiled .app into an .ipa file
          echo "Available .app bundles:"
          find build -type d -name "*.app" -print || true

          APP_PATH=$(find build -type d -path "*/Release-iphoneos/*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -type d -name "*.app" -print -quit)
          fi
          
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find .app file in build directory"
            echo "Build directory contents:"
            find build -maxdepth 5 -print || true
            echo "Last 100 lines of xcodebuild log:"
            tail -n 100 build.log || true
            exit 1
          fi
          
          rm -rf Payload app.ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -qry app.ipa Payload

      - name: Upload IPA File
        uses: actions/upload-artifact@v4
        with:
          name: clientTracking-iOS-IPA
          path: ios/app.ipa

name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub

jobs:
  build-ios:
    runs-on: macos-latest # This gives you a FREE Apple Mac to build on!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Expo Prebuild)
        run: npx expo prebuild --platform ios
        env:
          CI: true

      - name: Verify iOS Folder Generation
        run: |
          if [ ! -d "ios" ]; then
            echo "::error::The 'ios' folder was not generated. Expo prebuild failed."
            exit 1
          fi
          ls -R ios

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: List Xcode Schemes (Debug)
        run: |
          cd ios
          # Find the workspace file
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          echo "Found workspace: $WORKSPACE"
          xcodebuild -list -workspace "$WORKSPACE"

      - name: Build iOS App (Unsigned)
        run: |
          cd ios
          # Compile the app using Xcode on the GitHub Mac runner without Apple Developer account
          # Using shell expansion to find the workspace accurately
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          echo "Using workspace: $WORKSPACE"
          
          xcodebuild -workspace "$WORKSPACE" -scheme clientTracking -configuration Release -destination 'generic/platform=iOS' archive -archivePath ./build.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY=""
          
          # Package the compiled .app into an .ipa file
          mkdir -p Payload
          mv build.xcarchive/Products/Applications/*.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA File
        uses: actions/upload-artifact@v4
        with:
          name: clientTracking-iOS-IPA
          path: ios/app.ipa

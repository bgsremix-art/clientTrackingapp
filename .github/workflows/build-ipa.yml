name: Build Unsigned iOS IPA

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub

jobs:
  build-ios:
    runs-on: macos-latest # This gives you a FREE Apple Mac to build on!

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Generate iOS Folder (Expo Prebuild)
        run: npx expo prebuild --platform ios

      - name: List Xcode Schemes (Debug)
        run: |
          cd ios
          xcodebuild -list -workspace *.xcworkspace

      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Build iOS App (Unsigned)
        run: |
          cd ios
          # Compile the app using Xcode on the GitHub Mac runner without Apple Developer account
          # We use a wildcard for the workspace to avoid naming mismatches
          # Added -quiet to reduce logs but show errors
          xcodebuild -workspace *.xcworkspace -scheme clientTracking -configuration Release -destination 'generic/platform=iOS' archive -archivePath ./build.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" EXPANDED_CODE_SIGN_IDENTITY="" -quiet
          
          # Package the compiled .app into an .ipa file
          mkdir -p Payload
          mv build.xcarchive/Products/Applications/*.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA File
        uses: actions/upload-artifact@v4
        with:
          name: clientTracking-iOS-IPA
          path: ios/app.ipa
